name: PeerCode CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # -------------------------------------------
  #               frontend checks
  # -------------------------------------------
  frontend:
    name: Frontend (Lint & Format)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tauri-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Check formatting (Prettier)
        run: npx prettier --check "src/**/*.{ts,tsx,css}"

      - name: Lint (ESLint)
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # -------------------------------------------
  #           crdt-core checks
  # -------------------------------------------
  crdt-core:
    name: CRDT Core (Format, Lint, Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crdt-core

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Format
        run: cargo fmt --all -- --check
        working-directory: ./crdt-core

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: ./crdt-core

      - name: Test
        run: cargo test
        working-directory: ./crdt-core

      - name: Security Audit
        run: cargo audit
        working-directory: ./crdt-core

  # -------------------------------------------
  #           tauri checks (needs GUI deps)
  # -------------------------------------------
  tauri:
    name: Tauri (Format, Lint, Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app/src-tauri

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Create sidecar stubs
        run: |
          TARGET=$(rustc -vV | sed -n 's|host: ||p')
          mkdir -p tauri-app/src-tauri/binaries
          touch tauri-app/src-tauri/binaries/cloudflared-${TARGET}
          touch tauri-app/src-tauri/binaries/peercode-gateway-${TARGET}
          chmod +x tauri-app/src-tauri/binaries/cloudflared-${TARGET}
          chmod +x tauri-app/src-tauri/binaries/peercode-gateway-${TARGET}

      - name: Format
        run: cargo fmt --all -- --check
        working-directory: ./tauri-app/src-tauri

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: ./tauri-app/src-tauri

      - name: Test
        run: cargo test
        working-directory: ./tauri-app/src-tauri

      - name: Security Audit
        run: cargo audit
        working-directory: ./tauri-app/src-tauri

  # -------------------------------------------
  #                 go checks
  # -------------------------------------------
  go:
    name: Go (Format, Lint, Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.10'
          check-latest: true
          cache-dependency-path: gateway/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Security Audit
        run: govulncheck ./...